<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancer Molecular Basis Animation</title>
    <style>
        /* Add CSS styles for animations and layout */
        body { font-family: Arial, sans-serif; }
        .animation {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px;
        }
        .play-button { margin-top: 10px; padding: 10px 20px; background: #4CAF50; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Cancer Molecular Basis Animation</h1>
    <div class="animation" id="proto-oncogene">
        <h2>Proto-Oncogene Animation</h2>
        <!-- SVG for proto-oncogene animation -->
        <svg width="300" height="200">
            <!-- Example SVG content -->
            <circle cx="50" cy="100" r="30" fill="blue" />
            <text x="50" y="100" fill="white" text-anchor="middle" alignment-baseline="middle">Proto-Oncogene</text>
        </svg>
        <button class="play-button" onclick="playProtoOncogene()">Play</button>
    </div>
    <div class="animation" id="tumor-suppressor">
        <h2>Tumor Suppressor Animation</h2>
        <!-- SVG for tumor suppressor animation -->
        <svg width="300" height="200">
            <rect width="100" height="100" fill="red" />
            <text x="50" y="50" fill="white" text-anchor="middle" alignment-baseline="middle">Tumor Suppressor</text>
        </svg>
        <button class="play-button" onclick="playTumorSuppressor()">Play</button>
    </div>
    <div class="animation" id="two-hit-hypothesis">
        <h2>Two-Hit Hypothesis Animation</h2>
        <!-- SVG for two-hit hypothesis animation -->
        <svg width="300" height="200">
            <ellipse cx="150" cy="100" rx="70" ry="30" fill="orange" />
            <text x="150" y="100" fill="white" text-anchor="middle" alignment-baseline="middle">Two-Hit Hypothesis</text>
        </svg>
        <button class="play-button" onclick="playTwoHitHypothesis()">Play</button>
    </div>
    <script>
        // JavaScript functions for animations
        function playProtoOncogene() {
            alert('Playing Proto-Oncogene Animation');
            // Include animation functionality here
        }
        function playTumorSuppressor() {
            alert('Playing Tumor Suppressor Animation');
            // Include animation functionality here
        }
        function playTwoHitHypothesis() {
            alert('Playing Two-Hit Hypothesis Animation');
            // Include animation functionality here
        }
    </script>
</body>
</html>
